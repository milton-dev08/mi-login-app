version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-login
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: RootSegura123
      MYSQL_DATABASE: login_db
      MYSQL_USER: loginuser
      MYSQL_PASSWORD: ""                    
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    build: .
    container_name: apache-login
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html

volumes:
  mysql_data: